<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NyayaAI — Evidence Workstation</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles/main.css">
<style>
.ev-wrap { max-width:960px; margin:0 auto; padding:32px 24px; }
.ev-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; flex-wrap:wrap; gap:12px; }
.ev-title { font-family:'Playfair Display',serif; font-size:24px; color:var(--gold); }
.ev-subtitle { font-size:12px; color:var(--text2); margin-top:4px; }

/* Filter bar */
.filter-bar { display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
.filter-chip {
  font-size:11px; font-weight:600; padding:5px 14px; border-radius:2px;
  border:1px solid rgba(255,255,255,.12); background:transparent;
  color:var(--text2); cursor:pointer; transition:all .2s; letter-spacing:.04em;
}
.filter-chip:hover { color:var(--text); border-color:rgba(255,255,255,.25); }
.filter-chip.active { background:rgba(201,168,76,.12); border-color:rgba(201,168,76,.4); color:var(--gold); }

/* Evidence grid */
.ev-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:14px; }
.ev-card {
  background:rgba(255,255,255,.02); border:1px solid rgba(255,255,255,.08);
  border-radius:4px; overflow:hidden; cursor:pointer; transition:all .2s;
}
.ev-card:hover { border-color:rgba(201,168,76,.3); transform:translateY(-2px); }
.ev-card-header { padding:14px 16px; display:flex; align-items:flex-start; gap:12px; }
.ev-card-icon { font-size:28px; }
.ev-card-info { flex:1; }
.ev-card-title { font-size:13px; color:var(--text); font-weight:500; margin-bottom:4px; }
.ev-card-type { font-size:10px; letter-spacing:.08em; color:var(--text2); text-transform:uppercase; }
.ev-card-body { padding:0 16px 14px; font-size:12px; color:var(--text2); line-height:1.6; }
.ev-card-footer { padding:10px 16px; border-top:1px solid rgba(255,255,255,.05); display:flex; align-items:center; justify-content:space-between; }
.admissibility-tag { font-size:10px; font-weight:700; letter-spacing:.06em; padding:3px 9px; border-radius:2px; }
.tag-admissible { background:rgba(74,154,106,.15); color:#6DBF8A; }
.tag-inadmissible { background:rgba(192,80,80,.15); color:#E07070; }
.tag-disputed { background:rgba(255,165,0,.15); color:#FFA500; }
.bsa-ref { font-size:10px; color:rgba(201,168,76,.6); }
.cite-btn {
  font-size:10px; font-weight:600; padding:4px 12px; border-radius:2px;
  border:1px solid rgba(201,168,76,.3); background:rgba(201,168,76,.06);
  color:var(--gold); cursor:pointer; transition:all .2s;
}
.cite-btn:hover { background:rgba(201,168,76,.2); }

/* Detail modal */
.ev-modal-backdrop {
  position:fixed; inset:0; background:rgba(0,0,0,.75);
  display:none; align-items:center; justify-content:center; z-index:100;
}
.ev-modal-backdrop.show { display:flex; }
.ev-modal {
  background:linear-gradient(135deg,#0D1428,#06090F);
  border:1px solid rgba(201,168,76,.3); border-radius:6px;
  padding:28px; width:520px; max-width:90vw; max-height:80vh; overflow-y:auto;
  animation:fadeUp .25s ease;
}
.ev-modal-title { font-family:'Playfair Display',serif; font-size:18px; color:var(--gold); margin-bottom:6px; }
.ev-modal-meta { font-size:11px; color:var(--text2); margin-bottom:16px; }
.ev-modal-section { margin-bottom:14px; }
.ev-modal-section-title { font-size:10px; letter-spacing:.1em; color:var(--text2); text-transform:uppercase; margin-bottom:6px; }
.ev-modal-section-body { font-size:13px; color:var(--text); line-height:1.7; }
.ev-modal-footer { display:flex; justify-content:flex-end; gap:8px; margin-top:16px; }
.modal-close-btn {
  font-size:11px; font-weight:600; padding:8px 18px; border-radius:2px;
  border:1px solid rgba(255,255,255,.15); background:transparent;
  color:var(--text2); cursor:pointer; transition:all .2s;
}
.modal-close-btn:hover { color:var(--text); }
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-logo">NYAYA<span>AI</span></div>
  <div class="nav-links">
    <a href="dashboard.html">Dashboard</a>
    <a href="courtroom.html">Courtroom</a>
    <a href="ethics.html">Ethics</a>
  </div>
</nav>

<div class="ev-wrap">
  <div class="ev-header">
    <div>
      <div class="ev-title">Evidence Workstation</div>
      <div class="ev-subtitle" id="evSubtitle">Review and cite evidence for your case</div>
    </div>
    <button class="btn" onclick="window.location.href='courtroom.html'">← Back to Courtroom</button>
  </div>

  <div class="filter-bar">
    <button class="filter-chip active" onclick="filterEvidence(this,'all')">All</button>
    <button class="filter-chip" onclick="filterEvidence(this,'admissible')">Admissible</button>
    <button class="filter-chip" onclick="filterEvidence(this,'inadmissible')">Inadmissible</button>
    <button class="filter-chip" onclick="filterEvidence(this,'disputed')">Disputed</button>
    <button class="filter-chip" onclick="filterEvidence(this,'fir')">FIR</button>
    <button class="filter-chip" onclick="filterEvidence(this,'forensic')">Forensic</button>
    <button class="filter-chip" onclick="filterEvidence(this,'witness')">Witness</button>
  </div>

  <div class="ev-grid" id="evGrid">
    <div style="color:var(--text2);font-size:13px;padding:20px;grid-column:1/-1;">Loading evidence…</div>
  </div>
</div>

<!-- Detail modal -->
<div class="ev-modal-backdrop" id="evModal">
  <div class="ev-modal">
    <div class="ev-modal-title" id="modalTitle">Evidence Detail</div>
    <div class="ev-modal-meta" id="modalMeta"></div>
    <div class="ev-modal-section">
      <div class="ev-modal-section-title">Description</div>
      <div class="ev-modal-section-body" id="modalDesc"></div>
    </div>
    <div class="ev-modal-section">
      <div class="ev-modal-section-title">BSA Admissibility Basis</div>
      <div class="ev-modal-section-body" id="modalBSA"></div>
    </div>
    <div class="ev-modal-footer">
      <button class="modal-close-btn" onclick="closeModal()">Close</button>
      <button class="cite-btn" id="modalCiteBtn">Cite in Argument</button>
    </div>
  </div>
</div>

<div class="footer">
  NyayaAI <span>·</span> BNS / BNSS / BSA <span>·</span> Educational Use Only
</div>

<script src="../js/api.js"></script>
<script>
const ICONS = { fir:'📄', forensic:'🔬', cctv:'📹', witness:'👤', medical:'🏥', cdr:'📞', document:'📋', digital:'💻' };
let allEvidence = [];
let currentFilter = 'all';

async function loadEvidence() {
  const sessionId = localStorage.getItem('nyaya_session_id');
  const caseData = JSON.parse(localStorage.getItem('nyaya_case_data') || 'null');

  if (caseData?.evidence_items?.length) {
    allEvidence = caseData.evidence_items;
    renderEvidence(allEvidence);
    return;
  }
  if (sessionId) {
    try {
      const data = await api.getEvidence(sessionId);
      allEvidence = data.evidence || data;
      renderEvidence(allEvidence);
      return;
    } catch(e) {}
  }
  document.getElementById('evGrid').innerHTML =
    '<div style="color:var(--text2);font-size:13px;padding:20px;grid-column:1/-1;">No evidence found. Start a case from the dashboard.</div>';
}

function renderEvidence(items) {
  if (!items.length) {
    document.getElementById('evGrid').innerHTML =
      '<div style="color:var(--text2);font-size:13px;padding:20px;grid-column:1/-1;">No evidence items.</div>';
    return;
  }
  document.getElementById('evGrid').innerHTML = items.map((item, i) => `
    <div class="ev-card" onclick="showDetail(${i})">
      <div class="ev-card-header">
        <div class="ev-card-icon">${ICONS[item.type] || '📋'}</div>
        <div class="ev-card-info">
          <div class="ev-card-title">${item.title}</div>
          <div class="ev-card-type">${item.type || 'Document'}</div>
        </div>
      </div>
      <div class="ev-card-body">${(item.description || '').substring(0, 100)}${item.description?.length > 100 ? '…' : ''}</div>
      <div class="ev-card-footer">
        <span class="admissibility-tag tag-${item.admissibility}">${item.admissibility}</span>
        <span class="bsa-ref">${item.bsa_section || ''}</span>
        <button class="cite-btn" onclick="event.stopPropagation();citeItem('${item.title}')">Cite</button>
      </div>
    </div>`).join('');
}

function filterEvidence(el, filter) {
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  currentFilter = filter;
  const filtered = filter === 'all' ? allEvidence :
    allEvidence.filter(e => e.admissibility === filter || e.type === filter);
  renderEvidence(filtered);
}

function showDetail(i) {
  const item = allEvidence[i];
  document.getElementById('modalTitle').textContent = item.title;
  document.getElementById('modalMeta').textContent = `Type: ${item.type || '—'} · Admissibility: ${item.admissibility}`;
  document.getElementById('modalDesc').textContent = item.description || 'No description available.';
  document.getElementById('modalBSA').textContent = item.bsa_section
    ? `${item.bsa_section} — ${item.bsa_basis || 'See BSA for full admissibility rules.'}`
    : 'Admissibility to be determined by the Court under BSA.';
  document.getElementById('modalCiteBtn').onclick = () => { citeItem(item.title); closeModal(); };
  document.getElementById('evModal').classList.add('show');
}

function closeModal() {
  document.getElementById('evModal').classList.remove('show');
}

function citeItem(title) {
  localStorage.setItem('nyaya_cite_pending', `[Per ${title}]`);
  window.location.href = 'courtroom.html';
}

document.getElementById('evModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

loadEvidence();
</script>
</body>
</html>
