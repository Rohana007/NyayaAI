<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NyayaAI — Leaderboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles/main.css">
<style>
.lb-wrap { max-width:900px; margin:0 auto; padding:32px 24px; }
.lb-header { text-align:center; margin-bottom:32px; }
.lb-title { font-family:'Playfair Display',serif; font-size:28px; color:var(--gold); margin-bottom:6px; }
.lb-subtitle { font-size:13px; color:var(--text2); }

/* Podium */
.podium { display:flex; justify-content:center; align-items:flex-end; gap:16px; margin-bottom:36px; }
.podium-slot { text-align:center; }
.podium-avatar {
  width:52px; height:52px; border-radius:50%; margin:0 auto 8px;
  display:flex; align-items:center; justify-content:center;
  font-family:'Playfair Display',serif; font-size:20px; font-weight:700;
  border:2px solid;
}
.podium-1 .podium-avatar { border-color:var(--gold); background:rgba(201,168,76,.15); color:var(--gold); }
.podium-2 .podium-avatar { border-color:#C0C0C0; background:rgba(192,192,192,.1); color:#C0C0C0; }
.podium-3 .podium-avatar { border-color:#CD7F32; background:rgba(205,127,50,.1); color:#CD7F32; }
.podium-name { font-size:12px; color:var(--text); margin-bottom:4px; }
.podium-score { font-size:11px; color:var(--text2); }
.podium-block {
  border-radius:3px 3px 0 0; width:80px;
  display:flex; align-items:center; justify-content:center;
  font-family:'Playfair Display',serif; font-size:22px; font-weight:700;
}
.podium-1 .podium-block { height:70px; background:rgba(201,168,76,.15); border:1px solid rgba(201,168,76,.3); color:var(--gold); }
.podium-2 .podium-block { height:50px; background:rgba(192,192,192,.08); border:1px solid rgba(192,192,192,.2); color:#C0C0C0; }
.podium-3 .podium-block { height:36px; background:rgba(205,127,50,.08); border:1px solid rgba(205,127,50,.2); color:#CD7F32; }

/* Table */
.lb-table { width:100%; border-collapse:collapse; margin-bottom:28px; }
.lb-table th {
  font-size:10px; letter-spacing:.12em; color:var(--text2); text-transform:uppercase;
  padding:10px 14px; border-bottom:1px solid rgba(201,168,76,.2); text-align:left;
}
.lb-table td { padding:12px 14px; border-bottom:1px solid rgba(255,255,255,.04); font-size:13px; }
.lb-table tr:hover td { background:rgba(201,168,76,.04); }
.rank-num { font-family:'Playfair Display',serif; font-size:16px; color:var(--text2); }
.rank-1 { color:var(--gold); }
.rank-2 { color:#C0C0C0; }
.rank-3 { color:#CD7F32; }
.user-name { color:var(--text); font-weight:500; }
.user-college { font-size:11px; color:var(--text2); }
.score-cell { font-family:'Playfair Display',serif; font-size:16px; color:var(--gold); }
.bq-cell { color:#FFA500; font-size:12px; }
.badge-cell { display:flex; gap:4px; flex-wrap:wrap; }
.mini-badge { font-size:10px; padding:2px 7px; border-radius:2px; }

/* Filters */
.lb-filters { display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; }
.filter-btn {
  font-size:11px; font-weight:600; padding:6px 16px; border-radius:2px;
  border:1px solid rgba(255,255,255,.12); background:transparent;
  color:var(--text2); cursor:pointer; transition:all .2s; letter-spacing:.05em;
}
.filter-btn:hover { color:var(--text); border-color:rgba(255,255,255,.25); }
.filter-btn.active { background:rgba(201,168,76,.12); border-color:rgba(201,168,76,.4); color:var(--gold); }
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-logo">NYAYA<span>AI</span></div>
  <div class="nav-links">
    <a href="dashboard.html">Dashboard</a>
    <a href="evaluation.html">Evaluation</a>
    <a href="ethics.html">Ethics</a>
  </div>
</nav>

<div class="lb-wrap">
  <div class="lb-header">
    <div class="lb-title">🏆 Leaderboard</div>
    <div class="lb-subtitle">Top performers across all NyayaAI courtroom sessions</div>
  </div>

  <!-- Podium -->
  <div class="podium" id="podium">
    <div class="podium-slot podium-2">
      <div class="podium-avatar">2</div>
      <div class="podium-name" id="p2name">—</div>
      <div class="podium-score" id="p2score">—</div>
      <div class="podium-block">2</div>
    </div>
    <div class="podium-slot podium-1">
      <div class="podium-avatar">1</div>
      <div class="podium-name" id="p1name">—</div>
      <div class="podium-score" id="p1score">—</div>
      <div class="podium-block">1</div>
    </div>
    <div class="podium-slot podium-3">
      <div class="podium-avatar">3</div>
      <div class="podium-name" id="p3name">—</div>
      <div class="podium-score" id="p3score">—</div>
      <div class="podium-block">3</div>
    </div>
  </div>

  <!-- Filters -->
  <div class="lb-filters">
    <button class="filter-btn active" onclick="setFilter(this,'all')">All Time</button>
    <button class="filter-btn" onclick="setFilter(this,'week')">This Week</button>
    <button class="filter-btn" onclick="setFilter(this,'defence')">Defence</button>
    <button class="filter-btn" onclick="setFilter(this,'prosecution')">Prosecution</button>
  </div>

  <!-- Table -->
  <table class="lb-table">
    <thead>
      <tr>
        <th>#</th>
        <th>Advocate</th>
        <th>Score</th>
        <th>Sessions</th>
        <th>Bench Queries</th>
        <th>Badges</th>
      </tr>
    </thead>
    <tbody id="lbBody">
      <tr><td colspan="6" style="text-align:center;color:var(--text2);padding:24px;">Loading…</td></tr>
    </tbody>
  </table>
</div>

<div class="footer">
  NyayaAI <span>·</span> BNS / BNSS / BSA <span>·</span> Educational Use Only
</div>

<script src="../js/api.js"></script>
<script>
const BADGE_COLORS = {
  'First Argument': 'badge-gold',
  'Citation Master': 'badge-gold',
  'Objection Expert': 'badge-red',
  'Perfect Score': 'badge-gold',
  'Bench Query Ace': 'badge-blue',
};

async function loadLeaderboard() {
  try {
    const data = await api.getLeaderboard(20);
    renderLeaderboard(data.rankings || data);
  } catch(e) {
    document.getElementById('lbBody').innerHTML =
      `<tr><td colspan="6" style="text-align:center;color:var(--text2);padding:24px;">
        Could not load leaderboard. Start the backend server.
      </td></tr>`;
  }
}

function renderLeaderboard(rankings) {
  // Podium
  const top = rankings.slice(0, 3);
  if (top[0]) { document.getElementById('p1name').textContent = top[0].name || top[0].user_name; document.getElementById('p1score').textContent = top[0].avg_score || top[0].score; }
  if (top[1]) { document.getElementById('p2name').textContent = top[1].name || top[1].user_name; document.getElementById('p2score').textContent = top[1].avg_score || top[1].score; }
  if (top[2]) { document.getElementById('p3name').textContent = top[2].name || top[2].user_name; document.getElementById('p3score').textContent = top[2].avg_score || top[2].score; }

  // Table
  const rows = rankings.map((r, i) => {
    const rank = i + 1;
    const rankClass = rank <= 3 ? `rank-${rank}` : '';
    const badges = (r.badges || []).map(b =>
      `<span class="mini-badge badge ${BADGE_COLORS[b] || 'badge-blue'}">${b}</span>`
    ).join('');
    return `<tr>
      <td><span class="rank-num ${rankClass}">${rank}</span></td>
      <td>
        <div class="user-name">${r.name || r.user_name || 'Anonymous'}</div>
        <div class="user-college">${r.college || ''}</div>
      </td>
      <td class="score-cell">${r.avg_score || r.score || 0}</td>
      <td style="color:var(--text2);">${r.session_count || r.sessions || 0}</td>
      <td class="bq-cell">${r.bench_queries_total || r.bench_queries || 0}</td>
      <td><div class="badge-cell">${badges || '—'}</div></td>
    </tr>`;
  }).join('');
  document.getElementById('lbBody').innerHTML = rows || '<tr><td colspan="6" style="text-align:center;color:var(--text2);padding:24px;">No entries yet.</td></tr>';
}

function setFilter(el, filter) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  loadLeaderboard(); // In production, pass filter param
}

loadLeaderboard();
</script>
</body>
</html>
