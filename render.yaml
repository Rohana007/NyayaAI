services:
  - type: web
    name: nyayaai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false          # set manually in Render dashboard
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./nyayaai.db
      - key: CHROMA_DB_PATH
        value: ./data/chromadb
      - key: ENVIRONMENT
        value: production
